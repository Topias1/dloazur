},{label:"Manque de débit / flow",next:{kind:"go",to:{kind:"result",id:"electro-debit"}}},{label:"Cellule à inverser / nettoyer",next:{kind:"go",to:{kind:"question",id:"electro-4"}}},{label:"Autre / inconnue",next:{kind:"go",to:{kind:"question",id:"electro-4"}}}]},"electro-4":{id:"electro-4",title:"Inspecte la cellule (électrodes)",subtitle:"Coupe l'alimentation, démonte la cellule transparente et regarde les plaques",options:[{label:"Plaques recouvertes de calcaire blanc",next:{kind:"go",to:{kind:"result",id:"electro-entartree"}}},{label:"Plaques noircies, abîmées ou rongées",next:{kind:"go",to:{kind:"result",id:"electro-usee"}}},{label:"Plaques propres, l'appareil ne produit toujours rien",next:{kind:"go",to:{kind:"result",id:"electro-panne"}}}]},"green-1":{id:"green-1",title:"Vois-tu le fond de la piscine ?",options:[{label:"Oui, je vois le fond",next:{kind:"auto-green"}},{label:"Non, le fond est invisible",next:{kind:"go",to:{kind:"result",id:"algues-avancees"}}}]},"cloudy-1":{id:"cloudy-1",title:"La filtration fonctionne-t-elle correctement ?",options:[{label:"Oui",next:{kind:"go",to:{kind:"result",id:"floculant"}}},{label:"Non",next:{kind:"go",to:{kind:"result",id:"filtration-insuffisante"}}}]},"brown-1":{id:"brown-1",title:"Le problème est-il apparu après une pluie ?",options:[{label:"Oui, après la pluie",next:{kind:"go",to:{kind:"result",id:"eau-boueuse"}}},{label:"Non",next:{kind:"go",to:{kind:"question",id:"brown-2"}}}]},"brown-2":{id:"brown-2",title:"Y a-t-il présence de métaux dans l'eau ?",subtitle:"Tâches sur les parois, eau colorée après ajout de chlore...",options:[{label:"Oui",next:{kind:"go",to:{kind:"result",id:"metaux"}}},{label:"Non",next:{kind:"go",to:{kind:"result",id:"pollution-organique"}}}]},"clear-1":{id:"clear-1",title:"Quel est le problème exactement ?",options:[{label:"Algues sur les parois",next:{kind:"go",to:{kind:"result",id:"algues-parois"}}},{label:"Odeur forte de chlore",next:{kind:"go",to:{kind:"result",id:"odeur-forte"}}},{label:"Irritation des yeux",next:{kind:"go",to:{kind:"result",id:"irritation-yeux"}}}]}},Wp={"algues-avancees":{id:"algues-avancees",diagnostic:"Algues avancées",analyse:"L'eau verte avec un fond invisible indique une prolifération massive d'algues. Un traitement choc s'impose immédiatement.",plan:["Brosser énergiquement les parois et le fond","Effectuer un chlore choc à l'hypochlorite de calcium en poudre (30 g/m³, sans stabilisant)","Ajouter un anti-algues curatif","Filtration en continu pendant 24-48h","Nettoyer le filtre après traitement"]},"algues-installees":{id:"algues-installees",diagnostic:"Algues en cours d'installation",analyse:"Le chlore est normal mais le pH est correct, les algues commencent à s'installer. Action rapide nécessaire.",plan:["Brosser les parois et le fond","Ajouter un anti-algues préventif","Vérifier le TAC (alcalinité)","Filtration prolongée 12h"]},floculant:{id:"floculant",diagnostic:"Eau trouble - Particules en suspension",analyse:"La filtration fonctionne mais les particules sont trop fines. Un floculant va les agglomérer pour qu'elles soient filtrées.",plan:[]},"filtration-insuffisante":{id:"filtration-insuffisante",diagnostic:"Filtration insuffisante",analyse:"Sans une bonne filtration, aucun traitement chimique ne sera efficace. Il faut d'abord rétablir la filtration.",plan:["Vérifier l'état du filtre (sable, cartouche)","Nettoyer ou remplacer le média filtrant","Vérifier la pompe et les paniers","Augmenter le temps de filtration quotidien","Contrôler le débit après remise en route"]},"eau-boueuse":{id:"eau-boueuse",diagnostic:"Eau boueuse après pluie",analyse:"La pluie a ramené de la terre, des feuilles et des matières organiques dans le bassin. Traitement mécanique + chimique.",plan:["Aspirer les dépôts au fond à l'égout","Effectuer un chlore choc","Ajouter un floculant pour clarifier","Filtration continue 24h","Rincer le filtre après traitement"]},metaux:{id:"metaux",diagnostic:"Présence de métaux (fer, cuivre, manganèse)",analyse:"Les métaux dans l'eau provoquent une coloration brune/rouille. Ils proviennent souvent de l'eau de remplissage ou de la corrosion.",plan:["Ajouter un séquestrant de métaux","Ajuster le pH entre 7.2 et 7.4","Filtration continue 24h","Nettoyer le filtre régulièrement","Faire analyser l'eau de remplissage"]},"pollution-organique":{id:"pollution-organique",diagnostic:"Pollution organique",analyse:"Présence de matières organiques (pollens, feuilles, débris) qui colorent l'eau et consomment le chlore.",plan:["Nettoyage mécanique complet (épuisette, aspirateur)","Chlore choc","Floculant pour clarifier","Filtration continue 24h"]},"algues-parois":{id:"algues-parois",diagnostic:"Algues fixées sur les parois",analyse:"L'eau est claire mais les algues s'accrochent aux parois. Action préventive et curative douce nécessaire.",plan:["Brosser soigneusement toutes les parois","Ajouter un anti-algues préventif","Maintenir un chlore libre à 1.5 mg/L","Vérifier le pH (7.0 - 7.4)"]},"odeur-forte":{id:"odeur-forte",diagnostic:"Chloramines (chlore combiné)",analyse:"Une odeur forte de chlore signifie paradoxalement qu'il manque de chlore actif. Les chloramines saturent l'eau.",plan:["Effectuer un chlore choc pour détruire les chloramines","Aérer la piscine (jets, fontaines)","Filtration continue 12h","Renouveler partiellement l'eau si besoin"]},"irritation-yeux":{id:"irritation-yeux",diagnostic:"Déséquilibre du pH ou chloramines",analyse:"L'irritation des yeux vient soit d'un pH trop bas/haut, soit de chloramines accumulées.",plan:["Mesurer le pH et l'ajuster entre 7.2 et 7.4","Effectuer un chlore choc","Vérifier le TAC (80-120 mg/L)","Aérer le bassin"]},"electro-sel-bas":{id:"electro-sel-bas",diagnostic:"Taux de sel insuffisant",analyse:"Sans sel en quantité suffisante, l'électrolyseur ne peut pas produire de chlore. La majorité des appareils a besoin de 3000 à 5000 ppm pour fonctionner correctement.",plan:["Mesurer précisément le taux de sel (testeur électronique ou bandelettes)","Ajouter du sel pour piscine pour viser ~4000 ppm (consulter la notice de ton électrolyseur)","Verser le sel directement dans le bassin (pas dans le skimmer)","Filtration en marche 24h pour bien dissoudre","Re-tester puis relancer l'électrolyseur","En attendant, maintenir une chloration manuelle pour ne pas laisser l'eau virer"]},"electro-debit":{id:"electro-debit",diagnostic:"Défaut de débit (alarme flow)",analyse:"L'électrolyseur détecte un débit d'eau insuffisant et coupe la production par sécurité. Le problème vient en général du circuit de filtration.",plan:["Vérifier que la pompe tourne et que les vannes sont bien ouvertes","Nettoyer les paniers du skimmer et de la pompe","Nettoyer ou backwasher le filtre (manomètre dans le rouge)","Contrôler le détecteur de débit (flow switch) sur la cellule","Vérifier qu'il n'y a pas d'air dans le circuit (préfiltre étanche ?)","Si tout est propre et le débit OK : le capteur de débit est probablement HS"]},"electro-entartree":{id:"electro-entartree",diagnostic:"Cellule entartrée — nettoyage des électrodes",analyse:"Le calcaire blanc qui recouvre les plaques empêche l'électrolyse de se faire. C'est l'entretien le plus courant d'un électrolyseur, surtout si l'inversion de polarité est insuffisante ou si le pH est resté trop élevé.",plan:["Couper l'alimentation de l'électrolyseur ET de la pompe","Fermer les vannes et démonter la cellule transparente","Préparer un mélange : 1 volume d'acide chlorhydrique pour 9 volumes d'eau (verser l'acide dans l'eau, jamais l'inverse)","Plonger la cellule (côté électrodes) dans le mélange — laisser bouillonner 5 à 10 min max","Rincer abondamment à l'eau claire, remonter et relancer","Pour éviter que ça revienne : maintenir le pH entre 7.2 et 7.4, vérifier le réglage d'inversion de polarité"]},"electro-usee":{id:"electro-usee",diagnostic:"Électrodes usées — remplacement de la cellule",analyse:"Des plaques noircies, rongées ou avec un revêtement qui se décolle indiquent une cellule en fin de vie. La d
